bundle:
  name: amiga_bricks

sync:
  include:
    - static/roms/*.rom
    - static/roms/*.bin
    - static/games/*.adf
    - static/games/*.adz
    - static/games/*.dms
    - static/games/*.zip

resources:
  apps:
    amiga_bricks:
      name: 'amiga-bricks'
      description: 'Amiga Bricks — Web-based Amiga emulator powered by EmulatorJS and PUAE'
      source_code_path: .
      config:
        command:
          - 'python'
          - 'app.py'
        env:
          - name: 'UVICORN_HOST'
            value: '0.0.0.0'
      permissions:
        - level: CAN_USE
          group_name: users

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
